<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A personal travel journal to capture your adventures with photos, descriptions, and locations."
    />
    <title>Your Travel Journal</title>

    <!-- Fonts and Icons -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="journal.css" />
  </head>

  <body>
    <!-- Header Section -->
    <header class="top-nav" id="navbar">
      <div
        class="logo"
        onclick="location.href = 'track.html'"
        role="button"
        aria-label="Go to Tracker Page"
      >
        Route-Note
      </div>
      <div class="nav-links">
        <div
          class="nav-mini-btn"
          onclick="window.location.href='track.html'"
          role="button"
          aria-label="Go to Tracker Page"
        >
          Track Your Journey
        </div>
        <div
          class="nav-mini-btn"
          onclick="window.location.href='homepage.html'"
          role="button"
          aria-label="Go to Homepage"
        >
          Homepage!
        </div>
      </div>
    </header>

    <!-- Main Container -->
    <section class="main-container">
      <div class="header-content">
        <h2>Your Travel Journal</h2>
        <p>
          Explore the memories you've captured along your journey, with photos,
          descriptions, and map locations.
        </p>
      </div>

      <div class="entry-container" id="journalEntries">
        <!-- Journal Entries will be dynamically added here by journal.js -->
      </div>

      <button
        id="goBackHome"
        class="back-button"
        onclick="window.location.href='track.html'"
        aria-label="Return to Journey Tracker"
      >
        Back to Tracker
      </button>
    </section>

    <!-- 🔍 Modal Popup for Entry Details -->
    <div id="journalModal" class="journal-modal">
      <div class="journal-modal-content">
        <span class="close-modal" id="closeModalBtn" aria-label="Close modal"
          >&times;</span
        >
        <div id="modalContent">
          <!-- Populated dynamically via JS -->
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <div>© 2025 Travel Journal. All rights reserved.</div>
      <div class="social-icons">
        <a
          href="https://instagram.com/justsul"
          target="_blank"
          aria-label="Instagram Profile"
        >
          <img src="img/instagram.svg" alt="Instagram" width="35" height="35" />
        </a>
        <a
          href="https://github.com/Udipta-Saikia/map-journal"
          target="_blank"
          aria-label="GitHub Repository"
        >
          <img src="img/github.svg" alt="GitHub" width="35" height="35" />
        </a>
      </div>
    </footer>

    <!-- Firebase Journal Logic -->
    <script type="module" src="journal.js"></script>
  </body>
</html>
